services:
  database:
    build:
      context: .
      dockerfile: Dockerfile.database
    environment:
      ACCEPT_EULA: "${ACCEPT_EULA:-Y}"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "${MSSQL_PID:-Developer}"
    volumes:
      - dbData:/var/opt/mssql/data
    ports:
      - "${SQL_PORT:-1433}:1433"

  ollama-hub:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: "${OLLAMA_CONTAINER_NAME:-ollama}"
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - "${OLLAMA_STORAGE_PATH:-./ollama_storage}:/root/.ollama"
    
    # --- GPU KONFIGURATION ---
    # 1. Für NVIDIA GPUs (Setzt nvidia-container-toolkit auf dem Host voraus):
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # 2. Für AMD GPUs (ROCm) oder INTEL (Arc/iGPU):
    # Ersetze den 'deploy'-Block oben durch folgende 'devices'-Zeilen:
    # devices:
    #   - /dev/kfd:/dev/kfd     # Speziell für AMD ROCm
    #   - /dev/dri:/dev/dri     # Für AMD und Intel Grafikprozessoren
    # group_add:
    #   - video
    #   - render

    restart: unless-stopped
  audit-runner:
    build: 
      context: ./src
      dockerfile: dockerfile
    # run container in background and keep it alive for cron jobs
    command: tail -f /dev/null
    environment:
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL}
      SQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      SQL_SERVER: "${SQL_SERVER:-localhost}"
      SQL_DATABASE: "${SQL_DATABASE:-VenDocDemo}"
      SQL_PORT: "${SQL_PORT:-1433}"
    depends_on:
      - database
      - ollama-hub

  cronjob:
      image: mcuadros/ofelia:latest
      container_name: ofelia-scheduler
      depends_on:
        - audit-runner
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock:ro
      labels:
        ofelia.job-exec.audit-job.schedule: "0 0 23 * * *"  # Jeden Tag um 23:00 Uhr
        ofelia.job-exec.audit-job.container: "audit-runner"
        ofelia.job-exec.audit-job.command: "python main.py"
      restart: unless-stopped
volumes:
  dbData:
  ollama_storage: